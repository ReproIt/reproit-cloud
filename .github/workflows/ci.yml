name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      pg:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reproit
          POSTGRES_PASSWORD: reproit
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U reproit"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: ReproIt/reproit
          ref: 4a60ed45fcfc494b161f966217a0d46180fa4267
          path: _upstream/reproit-cli
      - name: Verify canonical CLI contracts
        env:
          REPROIT_CLI_ROOT: ${{ github.workspace }}/_upstream/reproit-cli
        run: ./scripts/cli-contracts.sh --check
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: self-hosted boundary audit
        run: ./scripts/audit-boundary.sh
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test (with Postgres-backed tenancy suite)
        env:
          TEST_DATABASE_URL: postgres://reproit:reproit@localhost:5433/postgres
        run: |
          cargo test 2>&1 | tee test.log
          # The tenancy integration tests skip silently without a DB; a skip
          # here means the service wiring broke, so fail loudly instead.
          if grep -q "SKIP" test.log; then
            echo "integration tests skipped; Postgres service not reachable"
            exit 1
          fi
      - name: check full feature set (Docker build parity)
        run: cargo check --features r2
      - name: audit production dependencies
        run: |
          cargo install cargo-audit --locked
          # SQLx locks its optional MySQL driver even though this build enables
          # PostgreSQL only. `cargo tree --target all -i rsa` is empty, so the
          # unfixed RSA advisory is unreachable in every supported artifact.
          cargo audit --ignore RUSTSEC-2023-0071
      - name: build and smoke the documented self-hosted stack
        run: |
          set -euo pipefail
          local_project=reproit-ci-${GITHUB_RUN_ID}-local
          object_project=reproit-ci-${GITHUB_RUN_ID}-object
          cleanup() {
            docker compose -p "$local_project" down -v --remove-orphans
            docker compose -p "$object_project" \
              -f compose.yml -f compose.object-store.yml \
              down -v --remove-orphans
          }
          trap cleanup EXIT
          docker compose -p "$local_project" up --build --detach
          if ! COMPOSE_PROJECT_NAME="$local_project" \
            ./scripts/smoke-self-hosted.sh; then
            docker compose -p "$local_project" logs --no-color
            exit 1
          fi
          docker compose -p "$local_project" down -v --remove-orphans

          docker compose -p "$object_project" \
            -f compose.yml -f compose.object-store.yml \
            up --build --detach
          if ! COMPOSE_PROJECT_NAME="$object_project" \
            COMPOSE_FILE=compose.yml:compose.object-store.yml \
            ./scripts/smoke-self-hosted.sh; then
            docker compose -p "$object_project" \
              -f compose.yml -f compose.object-store.yml logs --no-color
            exit 1
          fi
