<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Capture | Repro It</title><link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>:root{--bg:#0a0b0d;--panel:#111417;--line:rgba(255,255,255,.1);--ink:#e9ebec;--mut:#8b9298;--green:#4ade80;--red:#f4625a;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}*{box-sizing:border-box}body{margin:0;min-height:100vh;padding:40px 24px;background:var(--bg);color:var(--ink);font-family:system-ui,sans-serif}main{width:min(900px,100%);margin:auto}.brand{font:700 20px var(--mono);margin-bottom:34px}.brand span{color:var(--green)}.eyebrow{color:var(--green);font:700 11px var(--mono);text-transform:uppercase;letter-spacing:.1em}h1{font-size:32px;margin:8px 0}.sub{color:var(--mut);line-height:1.55}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:26px 0}.card{padding:16px;border:1px solid var(--line);border-radius:10px;background:var(--panel)}.card small{display:block;color:var(--mut);font:600 10px var(--mono);margin-bottom:7px}.card strong{font:600 13px var(--mono)}h2{font-size:16px;margin:28px 0 10px}.files{border:1px solid var(--line);border-radius:10px;overflow:hidden}.file{display:flex;justify-content:space-between;gap:16px;padding:13px 15px;background:var(--panel);font:500 12px var(--mono)}.file+.file{border-top:1px solid var(--line)}.file span:last-child{color:var(--mut)}.err{color:var(--red)}@media(max-width:620px){.grid{grid-template-columns:1fr}}</style></head>
<body><main><div class="brand">repro<span>·it</span></div><div class="eyebrow">Original capture</div><h1 id="title">Loading capture</h1><p class="sub" id="description"></p><div class="grid"><div class="card"><small>Capture ID</small><strong id="capture-id"></strong></div><div class="card"><small>Platform</small><strong id="platform"></strong></div><div class="card"><small>Status</small><strong id="status"></strong></div></div><h2>Immutable evidence</h2><div class="files" id="files"></div><p class="sub err" id="error"></p></main><script src="/capture.js?v=1"></script></body></html>
