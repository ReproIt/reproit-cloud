<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NimbusShop | reproit demo</title>
    <link rel="stylesheet" href="/demo/styles.css" />
  </head>
  <body>
    <!-- Onboarding banner: tells the person what to do to see the loop close.
         This app has the reproit SDK wired to YOUR cloud; interacting with it is
         exactly what a real user in production does. Populated by app.js once it
         reads the project from the query string. -->
    <div id="demo-banner" class="demo-banner" hidden>
      <span id="demo-banner-text"></span>
    </div>

    <header class="topbar">
      <a class="brand" href="#/" data-testid="brand">
        <img src="data:image/svg+xml;utf8,&lt;svg xmlns='http://www.w3.org/2000/svg' width='22' height='22'&gt;&lt;circle cx='11' cy='11' r='9' fill='%234f7cff'/&gt;&lt;/svg&gt;" alt="NimbusShop" />
        <span>NimbusShop</span>
      </a>
      <nav class="nav">
        <a href="#/" data-testid="nav-home">Home</a>
        <a href="#/cart" data-testid="nav-cart">Cart</a>
        <a href="#/profile" data-testid="nav-profile">Profile</a>
        <button data-testid="nav-help" class="linkish" data-nav="#/help">Help</button>
      </nav>
      <!-- BUG (a11y): no aria-label / no text, just an icon. Unnameable control. -->
      <button class="cart-icon" data-testid="cart-icon" data-nav="#/cart">
        <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 18a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm10 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zM5 6h16l-2 9H7L5 6zm0 0L4 3H1" fill="none" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
    </header>

    <main id="view" class="view"></main>

    <footer class="footer">
      <!-- BUG (broken-route): this path is not served -> 404 -> broken-route oracle. -->
      <a href="/docs/getting-started" data-testid="footer-docs">Docs</a>
      <a href="#/" data-testid="footer-home">Home</a>
      <span>© NimbusShop</span>
    </footer>

    <script src="/demo/reproit-web.js"></script>
    <script src="/demo/app.js"></script>
  </body>
</html>
