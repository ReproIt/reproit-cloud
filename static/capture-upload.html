<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Review capture | Repro It</title><link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>:root{--bg:#0a0b0d;--panel:#111417;--line:rgba(255,255,255,.1);--ink:#e9ebec;--mut:#8b9298;--green:#4ade80;--red:#f4625a;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:28px;background:var(--bg);color:var(--ink);font-family:system-ui,sans-serif}.card{width:min(620px,100%);padding:28px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}.brand{font:700 20px var(--mono);margin-bottom:24px}.brand span{color:var(--green)}h1{font-size:25px;margin:0 0 8px}.sub{color:var(--mut);line-height:1.55;margin:0 0 22px}.meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}.meta div{padding:11px;border:1px solid var(--line);border-radius:8px}.meta small,label{display:block;color:var(--mut);font:600 11px var(--mono);margin-bottom:6px}.meta strong{font:600 12px var(--mono)}label{margin-top:14px}input,textarea,select{width:100%;padding:11px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);font:500 13px var(--mono)}textarea{min-height:90px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}button{width:100%;margin-top:20px;padding:13px;border:0;border-radius:9px;background:var(--green);color:#06140c;font:700 13px var(--mono);cursor:pointer}button:disabled{opacity:.6}.msg{min-height:20px;margin-top:14px;color:var(--mut);font:500 12px var(--mono)}.err{color:var(--red)}.ok{color:var(--green)}@media(max-width:560px){.meta,.row{grid-template-columns:1fr}}</style></head>
<body><main class="card"><div class="brand">repro<span>·it</span></div><h1>Review capture</h1><p class="sub">Choose where this report belongs and add the context your team needs. Your terminal uploads the immutable original after approval.</p><div class="meta"><div><small>Capture</small><strong id="capture-id">Loading</strong></div><div><small>Target</small><strong id="target">Loading</strong></div></div><form id="form"><label for="project">Project</label><select id="project" required></select><label for="title">Title</label><input id="title" maxlength="200" required><label for="description">What did you observe?</label><textarea id="description" maxlength="10000"></textarea><div class="row"><div><label for="severity">Severity</label><select id="severity"><option value="normal">Normal</option><option value="low">Low</option><option value="high">High</option><option value="critical">Critical</option></select></div><div><label for="visibility">Visibility</label><select id="visibility"><option value="project">Project</option><option value="organization">Organization</option></select></div></div><button id="approve" type="submit">Approve upload</button><div class="msg" id="msg"></div></form></main><script src="/capture-upload.js?v=1"></script></body></html>
