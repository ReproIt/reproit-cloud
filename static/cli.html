<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Authorize ReproIt CLI</title><link rel="icon" href="/favicon.svg?v=20260715-1" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>:root{--bg:#0a0b0d;--panel:#111417;--line:rgba(255,255,255,.09);--ink:#e9ebec;--mut:#8b9298;--green:#4ade80;--red:#f4625a;--mono:"JetBrains Mono",monospace}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:28px;background:var(--bg);color:var(--ink);font-family:Archivo,system-ui}.card{width:min(440px,100%);padding:28px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}.brand{font:700 20px var(--mono);margin-bottom:25px}.brand span{color:var(--green)}h1{font-size:24px;margin:0 0 8px}.sub{color:var(--mut);line-height:1.55;margin:0 0 22px}.code{display:block;width:100%;margin:0 0 16px;padding:13px;border:1px solid var(--line);border-radius:9px;background:#0a0b0d;color:var(--ink);font:700 19px var(--mono);text-align:center;text-transform:uppercase;letter-spacing:.12em}button{width:100%;padding:13px;border:0;border-radius:9px;background:var(--green);color:#06140c;font:700 13px var(--mono);cursor:pointer}button:disabled{opacity:.6}.msg{min-height:20px;margin-top:15px;color:var(--mut);font:500 12px var(--mono)}.msg.err{color:var(--red)}.msg.ok{color:var(--green)}a{color:var(--green)}</style></head>
<body><main class="card"><div class="brand">repro<span>·it</span></div><h1>Authorize the CLI</h1><p class="sub">Confirm the code shown in your terminal. ReproIt will receive an account token and discover the projects in this organization.</p><input class="code" id="code" maxlength="9" autocomplete="one-time-code" aria-label="Authorization code"><button id="approve" type="button">Authorize reproit</button><div class="msg" id="msg"></div></main><script src="/cli.js?v=1"></script></body></html>
