# Prod-parity overlay: swap the local Postgres for Neon Local, a proxy that
# routes 5432 to a real Neon branch (production runs on Neon; see
# reproit-cloud-deploy/fly.toml). Requires a Neon account, NEON_API_KEY and
# NEON_PROJECT_ID in the environment / .env, and network access; the default
# compose.yml stays the offline, no-account path.
#
# By default each `up` creates an ephemeral branch from the project's default
# branch and deletes it on stop (set NEON_DELETE_BRANCH=false to keep it, or
# NEON_BRANCH_ID to pin an existing branch). Data does NOT persist across runs
# unless you do one of those.
#
# Bring up:  docker compose -f compose.yml -f compose.neon.yml up --build
services:
  pg:
    image: neondatabase/neon_local:v1.5
    environment:
      NEON_API_KEY: ${NEON_API_KEY:?set NEON_API_KEY to use the Neon overlay}
      NEON_PROJECT_ID: ${NEON_PROJECT_ID:?set NEON_PROJECT_ID to use the Neon overlay}
      # Empty means "branch from the project default / delete on stop".
      BRANCH_ID: ${NEON_BRANCH_ID:-}
      DELETE_BRANCH: ${NEON_DELETE_BRANCH:-true}
    # The proxy holds no data; drop the base service's Postgres volume.
    volumes: !reset []
    healthcheck:
      # Branch creation needs a cloud round-trip, hence the long start_period.
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432", "-U", "neon"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  cloud:
    environment:
      # Neon Local's credentials are fixed (neon/npg); the database name is the
      # one in your Neon project. sqlx needs sslmode=require here: the proxy's
      # cert is self-signed, and `require` encrypts without verifying it.
      DATABASE_URL: postgres://neon:npg@pg:5432/${NEON_DATABASE:-neondb}?sslmode=require
