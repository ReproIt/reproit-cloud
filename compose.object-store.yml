# Validation overlay for the S3-compatible evidence path. It is intentionally
# separate from the default local-filesystem quickstart.
services:
  minio:
    image: quay.io/minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data
    environment:
      MINIO_ROOT_USER: reproit-minio
      MINIO_ROOT_PASSWORD: reproit-minio-secret
    volumes:
      - reproit-minio:/data

  minio-init:
    image: quay.io/minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_started
    entrypoint: /bin/sh
    command:
      - -ec
      - |
        attempts=0
        until mc alias set local http://minio:9000 reproit-minio reproit-minio-secret; do
          attempts=$$((attempts + 1))
          test "$$attempts" -lt 30
          sleep 1
        done
        mc mb --ignore-existing local/reproit

  cloud:
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      R2_ACCESS_KEY_ID: reproit-minio
      R2_SECRET_ACCESS_KEY: reproit-minio-secret
      R2_BUCKET: reproit
      R2_ENDPOINT: http://minio:9000

volumes:
  reproit-minio:
